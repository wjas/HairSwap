<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-section {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 20px 0;
      border-radius: 5px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      background: #f5f5f5;
      padding: 10px;
      margin: 10px 0;
      border-radius: 3px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
    }
    .success {
      color: #28a745;
    }
    .error {
      color: #dc3545;
    }
    img {
      max-width: 100%;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🧪 API 测试工具</h1>
  
  <div class="test-section">
    <h3>1. 测试 API 连接</h3>
    <button onclick="testAPI()">测试 API</button>
    <div id="api-result"></div>
  </div>

  <div class="test-section">
    <h3>2. 测试图片上传</h3>
    <input type="file" id="photo-input" accept="image/png,image/jpeg">
    <div id="photo-preview"></div>
    <button onclick="testUpload()">测试上传</button>
    <div id="upload-result"></div>
  </div>

  <div class="test-section">
    <h3>3. 测试完整流程</h3>
    <button onclick="testFullFlow()">完整测试</button>
    <div id="full-result"></div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/generate';

    async function testAPI() {
      const resultDiv = document.getElementById('api-result');
      resultDiv.innerHTML = '<div class="result">测试中...</div>';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            photoBase64: 'test',
            hairstylePath: 'images/hairstyle1.png',
            prompt: 'test'
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          resultDiv.innerHTML = `<div class="result success">✅ API 正常\n状态码：${response.status}</div>`;
        } else {
          resultDiv.innerHTML = `<div class="result error">❌ API 错误\n状态码：${response.status}\n错误：${JSON.stringify(data, null, 2)}</div>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">❌ 请求失败\n${error.message}</div>`;
      }
    }

    let selectedPhotoBase64 = null;

    document.getElementById('photo-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        selectedPhotoBase64 = e.target.result;
        document.getElementById('photo-preview').innerHTML = 
          `<img src="${e.target.result}" style="max-height: 200px;">`;
      };
      reader.readAsDataURL(file);
    });

    async function testUpload() {
      const resultDiv = document.getElementById('upload-result');
      
      if (!selectedPhotoBase64) {
        resultDiv.innerHTML = '<div class="result error">请先选择图片</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="result">测试中...</div>';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            photoBase64: selectedPhotoBase64,
            hairstylePath: 'images/hairstyle1.png',
            prompt: '请保持脸部、五官、背景不变，仅将发型替换为参考图中的发型'
          })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          resultDiv.innerHTML = `
            <div class="result success">✅ 生成成功！\nURL: ${data.imageUrl}</div>
            <img src="${data.imageUrl}">
          `;
        } else {
          resultDiv.innerHTML = `<div class="result error">❌ 生成失败\n${JSON.stringify(data, null, 2)}</div>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">❌ 请求失败\n${error.message}</div>`;
      }
    }

    async function testFullFlow() {
      const resultDiv = document.getElementById('full-result');
      
      if (!selectedPhotoBase64) {
        resultDiv.innerHTML = '<div class="result error">请先选择图片</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="result">开始测试...\n1. 检查服务状态...</div>';
      
      try {
        // 测试服务
        const testResponse = await fetch('http://localhost:3000/health', {
          method: 'GET'
        }).catch(() => ({ ok: false }));
        
        resultDiv.innerHTML += `\n2. 服务状态：${testResponse.ok ? '✅ 正常' : '❌ 未启动'}`;
        
        // 测试生成
        resultDiv.innerHTML += '\n3. 开始生成...';
        
        const startTime = Date.now();
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            photoBase64: selectedPhotoBase64,
            hairstylePath: 'images/hairstyle1.png',
            prompt: '请保持脸部、五官、背景不变，仅将发型替换为参考图中的发型'
          })
        });
        
        const endTime = Date.now();
        const duration = endTime - startTime;
        
        resultDiv.innerHTML += `\n4. 响应时间：${duration}ms`;
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          resultDiv.innerHTML += `\n5. ✅ 生成成功！\nURL: ${data.imageUrl}`;
          resultDiv.innerHTML += `<img src="${data.imageUrl}">`;
        } else {
          resultDiv.innerHTML += `\n5. ❌ 生成失败\n状态码：${response.status}\n错误：${JSON.stringify(data, null, 2)}`;
        }
      } catch (error) {
        resultDiv.innerHTML += `\n5. ❌ 请求失败\n${error.message}\n\n请检查:\n- 服务是否运行\n- 图片是否太大\n- API Key 是否正确`;
      }
    }
  </script>
</body>
</html>
