<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>密码管理 - HairSwap</title>
  <link rel="stylesheet" href="styles/password-manager.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>🔐 密码管理</h1>
      <p>HairSwap 访问密码设置</p>
    </header>

    <div id="status-card" class="card">
      <h2 class="card-title">当前密码****</h2>
      <div id="status-badge" class="status-badge">加载中...</div>
      <div id="status-info">
        <div class="info-item">
          <span class="info-label">密码状态</span>
          <span id="status-text" class="info-value">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">过期时间</span>
          <span id="expires-text" class="info-value">-</span>
        </div>
      </div>
    </div>

    <div id="message" class="message" style="display: none;"></div>

    <div class="card">
      <h2 class="card-title">设置新密码</h2>
      <div class="form-group">
        <label for="new-password">4 位数字密码</label>
        <input type="text" id="new-password" maxlength="4" placeholder="例如：1234" inputmode="numeric" pattern="[0-9]*">
      </div>
      <div class="form-group">
        <label for="expires">过期时间（可选）</label>
        <input type="datetime-local" id="expires">
      </div>
      <button id="set-password-btn" class="btn btn-primary">设置密码</button>
    </div>

    <div class="card">
      <h2 class="card-title">管理操作</h2>
      <button id="disable-password-btn" class="btn btn-danger">禁用密码</button>
      <button id="delete-password-btn" class="btn btn-danger">删除密码</button>
    </div>

    <a href="index.html" class="back-link">← 返回首页</a>
  </div>

  <script src="js/password-manager.js"></script>
</body>

</html>
