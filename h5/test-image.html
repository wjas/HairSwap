<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .test-item {
      margin: 20px 0;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    img {
      max-width: 300px;
      border: 2px solid #eee;
    }
    .url {
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin: 10px 0;
    }
    .status {
      padding: 5px 10px;
      border-radius: 4px;
      display: inline-block;
      margin: 5px 0;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h1>🖼️ 历史记录图片测试</h1>
  
  <div id="test-results"></div>

  <script>
    const hostname = window.location.hostname;
    const port = 3001;
    const baseUrl = `http://${hostname}:${port}`;
    
    async function testImages() {
      const resultsDiv = document.getElementById('test-results');
      
      try {
        // 1. 获取历史记录列表
        const listResponse = await fetch(`${baseUrl}/history-list`);
        const listData = await listResponse.json();
        
        console.log('📋 历史记录列表:', listData);
        
        if (!listData.records || listData.records.length === 0) {
          resultsDiv.innerHTML = '<div class="status error">❌ 没有历史记录</div>';
          return;
        }
        
        // 2. 测试每张图片
        for (const record of listData.records) {
          const imageUrl = `${baseUrl}${record.imageUrl}`;
          
          const testItem = document.createElement('div');
          testItem.className = 'test-item';
          testItem.innerHTML = `
            <h3>记录 ${record.id}</h3>
            <div class="url">URL: ${imageUrl}</div>
            <div id="status-${record.id}">测试中...</div>
            <img src="${imageUrl}" 
                 alt="测试图片"
                 onload="document.getElementById('status-${record.id}').innerHTML='<span class=\\'success\\'>✅ 加载成功</span>'; console.log('✅ 图片加载成功:', this.src)"
                 onerror="document.getElementById('status-${record.id}').innerHTML='<span class=\\'error\\'>❌ 加载失败</span>'; console.error('❌ 图片加载失败:', this.src)">
          `;
          resultsDiv.appendChild(testItem);
        }
        
      } catch (error) {
        resultsDiv.innerHTML = `<div class="status error">❌ 测试失败：${error.message}</div>`;
        console.error('测试失败:', error);
      }
    }
    
    // 页面加载后执行测试
    testImages();
  </script>
</body>
</html>
