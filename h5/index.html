<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HairSwap - AI 换发型</title>
  <link rel="stylesheet" href="styles/main.css">
  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>

<body>
  <!-- 
  ============================================================================
  调试工具（用于移动端调试）
  使用说明：详见 /DEBUG_TOOL.md
  
  使用方法：
  1. 取消下方注释以启用调试功能
  2. 点击左下角红色 DEBUG 按钮查看控制台日志
  3. 右下角显示版本号（用于验证缓存刷新）
  ============================================================================
  -->
  <!-- <button id="debug-btn"
    style="position:fixed;bottom:5px;left:10px;font-size:12px;padding:4px 8px;background:#f00;color:#fff;border:none;border-radius:4px;z-index:10000;opacity:1;cursor:pointer;">DEBUG</button>
  <div id="debug-panel"
    style="display:none;position:fixed;bottom:30px;left:10px;right:10px;max-height:200px;overflow-y:auto;background:#000;color:#0f0;font-size:10px;padding:8px;border-radius:4px;z-index:9999;font-family:monospace;">
  </div> -->
  <div id="app">
    <!-- 首页 -->
    <div id="home-page" class="page active">
      <div class="container">
        <header class="header" style="display: none;">
          <h1 class="logo">HairSwap</h1>
          <p class="subtitle">AI 换发型，一键变美</p>
        </header>

        <main class="main-content">
          <!-- 步骤 1：上传照片 -->
          <section class="step">
            <div class="step-header">
              <span class="step-number">1</span>
              <h2>上传照片</h2>
            </div>
            <div class="photo-upload">
              <div id="photo-preview" class="preview-area">
                <div class="upload-placeholder">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                  </svg>
                  <p class="upload-text-desktop">点击上传正面照片</p>
                  <p class="upload-text-mobile" style="display: none;">拍摄/上传正面照片</p>
                  <span class="hint">支持 PNG/JPG，不超过 10MB</span>
                </div>
                <img id="photo-image" class="preview-image" src="" alt="预览">
                <button id="photo-remove" class="remove-btn">×</button>
              </div>
              <!-- 手机端按钮 -->
              <div class="mobile-upload-buttons" id="mobile-upload-buttons">
                <button class="upload-btn" id="camera-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                  </svg>
                  上传照片
                </button>
              </div>
              <input type="file" id="photo-input" accept="image/*" hidden>
              <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
              <input type="file" id="gallery-input" accept="image/*" hidden>
            </div>
          </section>

          <!-- 步骤 2：选择发型 -->
          <section class="step">
            <div class="step-header">
              <span class="step-number">2</span>
              <h2>选择发型</h2>
            </div>
            <div class="hairstyle-grid">
              <div class="hairstyle-item" data-style="style1">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle1_thumb.jpg" alt="发型 1">
                </div>
                <span class="hairstyle-name">发型 1</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style2">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle2_thumb.jpg" alt="发型 2">
                </div>
                <span class="hairstyle-name">发型 2</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style3">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle3_thumb.jpg" alt="发型 3">
                </div>
                <span class="hairstyle-name">发型 3</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style4">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle4_thumb.jpg" alt="发型 4">
                </div>
                <span class="hairstyle-name">发型 4</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style5">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle5_thumb.jpg" alt="发型 5">
                </div>
                <span class="hairstyle-name">发型 5</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style6">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle6_thumb.jpg" alt="发型 6">
                </div>
                <span class="hairstyle-name">发型 6</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style7">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle7_thumb.jpg" alt="发型 7">
                </div>
                <span class="hairstyle-name">发型 7</span>
                <div class="check-mark">✓</div>
              </div>
              <div class="hairstyle-item" data-style="style8">
                <div class="hairstyle-thumb">
                  <img src="images/hairstyle8_thumb.jpg" alt="发型 8">
                </div>
                <span class="hairstyle-name">发型 8</span>
                <div class="check-mark">✓</div>
              </div>
            </div>
          </section>

          <!-- 生成按钮 -->
          <button id="generate-btn" class="generate-btn" disabled>
            <span>立即生成</span>
          </button>

          <!-- 历史记录按钮 -->
          <div class="bottom-buttons" style="display: flex; gap: 12px; margin-top: 20px;">
            <button id="model-btn" class="history-btn" style="flex: 1; margin: 0;">
              <span>4.5</span>
            </button>
            <button id="history-btn" class="history-btn" style="flex: 1; margin: 0;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              <span>生成记录</span>
            </button>
          </div>
        </main>

        <footer class="footer" style="display: none;">
          <p>基于火山引擎 doubao-seedream 5.0 模型</p>
        </footer>
      </div>
    </div>

    <!-- 加载页面 -->
    <div id="loading-page" class="page">
      <div class="loading-container">
        <div class="loading-animation">
          <div class="spinner"></div>
          <div class="loading-text">AI 正在为你设计发型...</div>
          <div class="loading-hint">预计需要 10-20 秒</div>
        </div>
      </div>
    </div>

    <!-- 结果页面 -->
    <div id="result-page" class="page">
      <div class="container">
        <header class="result-header" id="result-header">
          <button id="back-btn" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <h2>换发型效果</h2>
          <div class="header-spacer"></div>
        </header>

        <main class="result-content">
          <div class="result-image-container">
            <img id="result-image" class="result-image" src="" alt="换发型效果">
            <!-- 对比按钮（右下角） -->
            <button id="compare-btn" class="compare-btn" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <!-- 左半圆虚线 -->
                <path stroke-dasharray="3 3" d="M12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20" />
                <!-- 右半圆实线 -->
                <path d="M12 4C16.4183 4 20 7.58172 20 12C20 16.4183 16.4183 20 12 20" />
                <!-- 中间分割线 -->
                <path d="M12 4V20" />
              </svg>
            </button>
          </div>

          <div class="result-actions">
            <button id="regenerate-btn" class="secondary-btn" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10" />
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
              </svg>
              <span>换一个</span>
            </button>
            <button id="save-btn" class="primary-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              <span>保存图片</span>
            </button>
          </div>
        </main>
      </div>
    </div>

    <!-- 密码验证弹窗 -->
    <div id="password-modal" class="modal" style="display: none;">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h2 class="modal-title">🔐 请输入访问密码</h2>
        <p class="modal-desc">请输入 4 位数密码以继续访问</p>
        <div class="password-input-container">
          <input type="tel" id="password-input-1" class="password-digit" maxlength="1" inputmode="numeric"
            pattern="[0-9]*" autocomplete="off">
          <input type="tel" id="password-input-2" class="password-digit" maxlength="1" inputmode="numeric"
            pattern="[0-9]*" autocomplete="off">
          <input type="tel" id="password-input-3" class="password-digit" maxlength="1" inputmode="numeric"
            pattern="[0-9]*" autocomplete="off">
          <input type="tel" id="password-input-4" class="password-digit" maxlength="1" inputmode="numeric"
            pattern="[0-9]*" autocomplete="off">
          <input type="password" id="password-input-hidden" class="password-input-hidden" maxlength="4">
        </div>
        <div id="password-error" class="error-message" style="display: none;"></div>
        <div class="modal-buttons">
          <button id="password-submit-btn" class="primary-btn" style="width: 100%;">确认</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js?v=20260310q"></script>
  <script>
    // 暴露 app 到全局作用域
    window.app = window.hairSwapApp;
  </script>
</body>

</html>
